<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bible Forest Trail - Cloud Sync</title>
    <style>
        :root {
            --bg-color: #0f1a0f;
            --grid-bg: #1e331e;
            --wall-color: #0a140a;
            --path-color: #388e3c;
            --player-color: #ffd600;
            --goal-color: #ff3d00;
            --trap-color: #d32f2f;
            --hint-color: #fff176;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            touch-action: manipulation;
        }

        .status-bar {
            position: fixed;
            top: -65px;
            left: 0;
            width: 100%;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            z-index: 2000;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        #error-bar { background: #ff1744; color: white; }
        #success-bar { background: #00c853; color: white; }

        .header-ui { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        button { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; font-family: inherit; cursor: pointer; }
        .btn-blueprint { background: #00897b; color: white; }
        .btn-reset { background: #5d4037; color: white; }

        #grid {
            display: grid;
            grid-template-columns: repeat(10, 32px);
            grid-template-rows: repeat(10, 32px);
            gap: 2px;
            background: var(--grid-bg);
            padding: 8px;
            border-radius: 12px;
            border: 4px solid #3e2723;
        }

        .cell { width: 32px; height: 32px; border-radius: 4px; background: var(--wall-color); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .path { background: var(--path-color); opacity: 0.5; }
        .hint { background: var(--hint-color) !important; opacity: 1; }
        .player { background: var(--player-color); border-radius: 50%; z-index: 5; transition: all 0.1s ease; }
        .trap { background: var(--trap-color); }
        .goal { background: var(--goal-color); }

        .controls { margin-top: 25px; display: grid; grid-template-areas: ". up ." "left down right"; gap: 15px; }
        .d-btn { width: 65px; height: 65px; background: #2e7d32; border: 3px solid #1b5e20; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 5px #1b5e20; cursor: pointer; }
        .d-btn:active { transform: translateY(3px); box-shadow: 0 2px #1b5e20; }

        #quiz-modal {
            display: none;
            position: fixed;
            top: 15%;
            width: 85%;
            max-width: 350px;
            background: white;
            color: #222;
            padding: 25px;
            border-radius: 20px;
            z-index: 1000;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        #q-input { width: 85%; padding: 12px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; }
    </style>
</head>
<body>

    <div id="error-bar" class="status-bar">WRONG! TRY AGAIN!</div>
    <div id="success-bar" class="status-bar">WELL DONE!</div>

    <div class="header-ui">
        <button class="btn-blueprint" onclick="showBlueprint()">📜 Blueprint</button>
        <button class="btn-reset" onclick="resetGame()">🔄 New Trail</button>
        <span style="font-weight:bold">Steps: <span id="steps">0</span></span>
    </div>

    <div id="grid"></div>

    <div class="controls">
        <div class="d-btn" style="grid-area: up" onclick="move(0, -1)">▲</div>
        <div class="d-btn" style="grid-area: left" onclick="move(-1, 0)">◀</div>
        <div class="d-btn" style="grid-area: down" onclick="move(0, 1)">▼</div>
        <div class="d-btn" style="grid-area: right" onclick="move(1, 0)">▶</div>
    </div>

    <div id="quiz-modal">
        <h2 style="color:#2e7d32; margin-top:0;">Faith Question</h2>
        <p id="q-text" style="font-size: 18px; margin-bottom: 20px; font-weight: 500;"></p>
        <input type="text" id="q-input" placeholder="Your answer...">
        <button onclick="checkAnswer()" style="background: #2e7d32; color: white; width: 100%; padding: 12px; border-radius: 10px; font-size: 18px;">Submit</button>
    </div>

    <script>
        const size = 10;
        let playerPos = { x: 0, y: 0 };
        let steps = 0;
        let isLocked = true; // Locked until questions load
        let map = [];
        let pathCells = [];
        let bibleQuestions = [];

        // Your specific Document ID
        const DOC_ID = '1tHFeMSBclX2bS7t5u5hw6l5WFijnjyTVBJR_rxeG2oo';

        async function loadQuestions() {
            try {
                // Fetch document as plain text
                const response = await fetch(`https://docs.google.com/document/d/${DOC_ID}/export?format=txt`);
                if (!response.ok) throw new Error("Document not found or not shared properly");
                
                const text = await response.text();
                
                // Parse lines formatted as "Question: Answer"
                bibleQuestions = text.split('\n')
                    .filter(line => line.includes(':'))
                    .map(line => {
                        const parts = line.split(':');
                        return { 
                            q: parts[0].trim(), 
                            a: parts[1].trim().toLowerCase() 
                        };
                    });

                if (bibleQuestions.length > 0) {
                    isLocked = false;
                    init();
                } else {
                    alert("Document loaded, but no questions found. Use 'Question: Answer' format.");
                }
            } catch (err) {
                console.error(err);
                alert("Failed to load questions. Make sure the Google Doc is shared with 'Anyone with the link'.");
            }
        }

        function generateMap() {
            map = Array.from({ length: size }, () => Array(size).fill(0));
            pathCells = [];
            let x = 0, y = 0;
            while (x < size - 1 || y < size - 1) {
                map[y][x] = 1;
                pathCells.push({x, y});
                if (x === size - 1) y++;
                else if (y === size - 1) x++;
                else {
                    if (Math.random() > 0.5) x++;
                    else y++;
                }
            }
            map[size-1][size-1] = 3; 

            let traps = 0;
            while (traps < 3) { // Increased traps slightly
                let idx = Math.floor(Math.random() * (pathCells.length - 2)) + 1;
                let c = pathCells[idx];
                if (map[c.y][c.x] !== 2) { map[c.y][c.x] = 2; traps++; }
            }
        }

        function init() {
            generateMap();
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let y=0; y<size; y++) {
                for(let x=0; x<size; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `c-${x}-${y}`;
                    if(map[y][x] === 1) cell.classList.add('path');
                    if(map[y][x] === 2) cell.classList.add('trap');
                    if(map[y][x] === 3) { cell.classList.add('goal'); cell.innerText = '🏠'; }
                    grid.appendChild(cell);
                }
            }
            playerPos = { x: 0, y: 0 };
            steps = 0;
            document.getElementById('steps').innerText = steps;
            drawPlayer();
        }

        function drawPlayer() {
            document.querySelectorAll('.cell').forEach(c => { 
                if(c.innerText === '🚶') c.innerText = ''; 
                c.classList.remove('player'); 
            });
            const pCell = document.getElementById(`c-${playerPos.x}-${playerPos.y}`);
            if(pCell) {
                pCell.classList.add('player');
                pCell.innerText = '🚶';
            }
        }

        function move(dx, dy) {
            if(isLocked) return;
            let nx = playerPos.x + dx;
            let ny = playerPos.y + dy;
            if(nx >= 0 && nx < size && ny >= 0 && ny < size && map[ny][nx] !== 0) {
                playerPos = { x: nx, y: ny };
                steps++;
                document.getElementById('steps').innerText = steps;
                drawPlayer();
                
                if(map[ny][nx] === 2) {
                    isLocked = true;
                    const q = bibleQuestions[Math.floor(Math.random() * bibleQuestions.length)];
                    document.getElementById('q-text').innerText = q.q;
                    document.getElementById('quiz-modal').style.display = 'block';
                    window.currentA = q.a;
                    setTimeout(() => document.getElementById('q-input').focus(), 100);
                }
                
                if(map[ny][nx] === 3) { triggerSuccess(); }
            }
        }

        function triggerSuccess() {
            isLocked = true;
            const bar = document.getElementById('success-bar');
            bar.style.top = '0';
            setTimeout(() => {
                bar.style.top = '-65px';
                resetGame();
                isLocked = false;
            }, 2000);
        }

        function showError() {
            const bar = document.getElementById('error-bar');
            bar.style.top = '0';
            setTimeout(() => { bar.style.top = '-65px'; }, 2500);
        }

        function checkAnswer() {
            const val = document.getElementById('q-input').value.toLowerCase().trim();
            // Checks if the correct answer keyword is inside the player's response
            if(val.includes(window.currentA)) {
                document.getElementById('quiz-modal').style.display = 'none';
                document.getElementById('q-input').value = '';
                map[playerPos.y][playerPos.x] = 1; 
                document.getElementById(`c-${playerPos.x}-${playerPos.y}`).className = 'cell path player';
                isLocked = false;
            } else {
                showError();
            }
        }

        function showBlueprint() {
            document.querySelectorAll('.path, .trap').forEach(c => c.classList.add('hint'));
            setTimeout(() => { 
                document.querySelectorAll('.hint').forEach(c => c.classList.remove('hint')); 
            }, 1000);
        }

        function resetGame() { init(); }

        // Start the process
        loadQuestions();
    </script>
</body>
</html>
